<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business English Daily Quiz</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F8F7F4;
    --surface: #FFFFFF;
    --border: rgba(0,0,0,0.1);
    --border-strong: rgba(0,0,0,0.2);
    --text: #1A1A1A;
    --text-sub: #666;
    --text-hint: #999;
    --blue-bg: #E6F1FB;
    --blue-text: #0C447C;
    --blue-mid: #378ADD;
    --green-bg: #EAF3DE;
    --green-text: #27500A;
    --green-mid: #639922;
    --red-bg: #FCEBEB;
    --red-text: #791F1F;
    --amber-bg: #FAEEDA;
    --amber-text: #633806;
    --teal-bg: #E1F5EE;
    --teal-text: #085041;
    --teal-mid: #1D9E75;
    --radius: 10px;
    --radius-lg: 14px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 80px;
  }

  header {
    background: var(--surface);
    border-bottom: 0.5px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .logo {
    display: flex;
    align-items: baseline;
    gap: 8px;
  }

  .logo-main {
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.3px;
    color: var(--text);
  }

  .logo-date {
    font-size: 12px;
    color: var(--text-hint);
    font-weight: 400;
  }

  .header-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .btn-copy {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 7px 14px;
    background: var(--surface);
    border: 0.5px solid var(--border-strong);
    border-radius: 20px;
    font-size: 13px;
    color: var(--text-sub);
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
  }

  .btn-copy:hover { background: var(--bg); }
  .btn-copy.copied { color: var(--green-text); border-color: var(--green-mid); background: var(--green-bg); }

  main {
    max-width: 600px;
    margin: 0 auto;
    padding: 28px 20px 0;
  }

  .day-banner {
    background: linear-gradient(135deg, #185FA5 0%, #1D9E75 100%);
    border-radius: var(--radius-lg);
    padding: 20px 24px;
    margin-bottom: 24px;
    color: white;
  }

  .day-banner-label { font-size: 11px; opacity: 0.75; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
  .day-banner-title { font-size: 20px; font-weight: 600; margin-bottom: 2px; }
  .day-banner-sub { font-size: 13px; opacity: 0.8; }

  .scorebar {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 24px;
  }

  .score-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    text-align: center;
  }

  .score-card-label { font-size: 11px; color: var(--text-hint); margin-bottom: 4px; }
  .score-card-val { font-size: 20px; font-weight: 600; color: var(--text); }

  .progress-wrap { margin-bottom: 24px; }
  .progress-track { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--blue-mid); border-radius: 2px; transition: width 0.4s ease; }
  .progress-label { font-size: 12px; color: var(--text-hint); margin-top: 6px; }

  .quiz-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 24px;
    margin-bottom: 14px;
  }

  .q-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
  }

  .q-type-tag {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .tag-vocab { background: var(--blue-bg); color: var(--blue-text); }
  .tag-grammar { background: var(--teal-bg); color: var(--teal-text); }

  .q-category {
    font-size: 12px;
    color: var(--text-hint);
  }

  .q-word {
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.5px;
    color: var(--text);
    margin-bottom: 4px;
    line-height: 1.2;
  }

  .q-pos {
    font-size: 13px;
    color: var(--text-hint);
    font-style: italic;
    margin-bottom: 18px;
  }

  .q-sentence {
    font-size: 15px;
    color: var(--text);
    line-height: 1.7;
    margin-bottom: 18px;
    padding: 14px 16px;
    background: var(--bg);
    border-radius: var(--radius);
    border-left: 3px solid var(--teal-mid);
  }

  .q-sentence .blank {
    display: inline-block;
    min-width: 80px;
    border-bottom: 2px solid var(--text);
    font-weight: 600;
    text-align: center;
    padding: 0 4px;
  }

  .options { display: flex; flex-direction: column; gap: 9px; }

  .opt-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 13px 16px;
    background: var(--surface);
    border: 0.5px solid var(--border-strong);
    border-radius: var(--radius);
    font-size: 14px;
    color: var(--text);
    cursor: pointer;
    transition: border-color 0.12s, background 0.12s;
    text-align: left;
    font-family: inherit;
    line-height: 1.4;
  }

  .opt-btn:hover:not(:disabled) {
    background: var(--bg);
    border-color: var(--blue-mid);
  }

  .opt-label {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 1px solid var(--border-strong);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 600;
    flex-shrink: 0;
    color: var(--text-sub);
    transition: background 0.12s, border-color 0.12s;
  }

  .opt-btn.correct { background: var(--green-bg); border-color: var(--green-mid); }
  .opt-btn.correct .opt-label { background: var(--green-mid); border-color: var(--green-mid); color: white; }
  .opt-btn.wrong { background: var(--red-bg); border-color: #E24B4A; }
  .opt-btn.wrong .opt-label { background: #E24B4A; border-color: #E24B4A; color: white; }
  .opt-btn:disabled { cursor: default; }

  .feedback-box {
    margin-top: 14px;
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 13px;
    line-height: 1.6;
    display: none;
  }

  .feedback-box.show { display: block; }
  .feedback-box.ok { background: var(--green-bg); color: var(--green-text); }
  .feedback-box.ng { background: var(--red-bg); color: var(--red-text); }

  .next-btn {
    width: 100%;
    padding: 14px;
    background: var(--surface);
    border: 0.5px solid var(--border-strong);
    border-radius: var(--radius);
    font-size: 15px;
    color: var(--text);
    cursor: pointer;
    font-family: inherit;
    transition: background 0.12s;
    display: none;
    font-weight: 500;
  }

  .next-btn:hover { background: var(--bg); }

  /* Loading */
  .loading-screen {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-sub);
  }

  .spinner {
    width: 32px;
    height: 32px;
    border: 2.5px solid var(--border);
    border-top-color: var(--blue-mid);
    border-radius: 50%;
    animation: spin 0.75s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-screen p { font-size: 15px; margin-bottom: 4px; }
  .loading-screen small { font-size: 13px; color: var(--text-hint); }

  /* Result */
  .result-screen {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 40px 24px;
    text-align: center;
  }

  .result-emoji { font-size: 40px; margin-bottom: 12px; }
  .result-score { font-size: 48px; font-weight: 700; color: var(--text); letter-spacing: -1px; margin-bottom: 6px; }
  .result-label { font-size: 15px; color: var(--text-sub); margin-bottom: 28px; line-height: 1.5; }

  .result-breakdown {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 28px;
  }

  .breakdown-item {
    background: var(--bg);
    border-radius: var(--radius);
    padding: 12px;
  }

  .breakdown-item-label { font-size: 11px; color: var(--text-hint); margin-bottom: 4px; }
  .breakdown-item-val { font-size: 18px; font-weight: 600; }
  .breakdown-item-val.green { color: var(--green-text); }
  .breakdown-item-val.blue { color: var(--blue-text); }

  .restart-btn {
    padding: 13px 36px;
    background: var(--text);
    border: none;
    border-radius: var(--radius);
    font-size: 15px;
    color: white;
    cursor: pointer;
    font-family: inherit;
    font-weight: 500;
    transition: opacity 0.12s;
  }

  .restart-btn:hover { opacity: 0.85; }

  .share-reminder {
    margin-top: 16px;
    font-size: 13px;
    color: var(--text-hint);
  }

  /* Error */
  .error-screen {
    text-align: center;
    padding: 60px 20px;
  }

  .error-screen p { font-size: 15px; color: var(--text-sub); margin-bottom: 16px; }

  .retry-btn {
    padding: 10px 28px;
    border: 0.5px solid var(--border-strong);
    border-radius: var(--radius);
    background: var(--surface);
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
    color: var(--text);
  }

  @media (max-width: 480px) {
    header { padding: 12px 16px; }
    main { padding: 20px 14px 0; }
    .q-word { font-size: 24px; }
    .day-banner { padding: 16px 18px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-main">Business English</span>
    <span class="logo-date" id="header-date"></span>
  </div>
  <div class="header-actions">
    <button class="btn-copy" id="copy-btn" onclick="copyURL()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      URLをコピー
    </button>
  </div>
</header>

<main id="main">
  <div class="loading-screen" id="loading-view">
    <div class="spinner"></div>
    <p>今日の問題を生成中...</p>
    <small>AIがビジネス英語の問題を準備しています</small>
  </div>
</main>

<script>
const TOTAL = 25;
const VOCAB_COUNT = 10;
const GRAMMAR_COUNT = 15;

const todayKey = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
};

const formatDate = () => {
  const d = new Date();
  return d.toLocaleDateString('ja-JP', { year:'numeric', month:'long', day:'numeric', weekday:'short' });
};

document.getElementById('header-date').textContent = formatDate();

let questions = [];
let current = 0;
let correctCount = 0;
let vocabCorrect = 0;
let grammarCorrect = 0;
let answered = false;
const LABELS = ['A','B','C','D'];

// ---- Cache ----
function getCached() {
  try {
    const raw = localStorage.getItem('beq_' + todayKey());
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return null;
}

function setCache(data) {
  try {
    localStorage.setItem('beq_' + todayKey(), JSON.stringify(data));
    // clean old keys
    Object.keys(localStorage).forEach(k => {
      if (k.startsWith('beq_') && k !== 'beq_' + todayKey()) localStorage.removeItem(k);
    });
  } catch(e) {}
}

// ---- API ----
async function fetchFromAPI() {
  const prompt = `You are a business English quiz generator for Japanese learners. Generate exactly ${TOTAL} quiz questions: ${VOCAB_COUNT} vocabulary questions and ${GRAMMAR_COUNT} grammar questions. All questions are about business and finance English.

VOCABULARY questions: give a business/finance English word, its part of speech, its category, and 4 Japanese translation options.

GRAMMAR questions: give a fill-in-the-blank sentence in business English context with 4 English word/phrase options. Include a brief Japanese explanation of why the correct answer is right.

Respond ONLY with a valid JSON array (no markdown, no backticks, no explanation). Format:
[
  {
    "type": "vocab",
    "word": "amortization",
    "partOfSpeech": "noun",
    "category": "Accounting",
    "options": ["減価償却", "資金調達", "合併買収", "資産評価"],
    "correctIndex": 0,
    "explanation": "無形資産や負債を一定期間にわたって費用配分する会計処理。ローンの元本返済にも使う。"
  },
  {
    "type": "grammar",
    "category": "Business Writing",
    "sentence": "We need to ___ the contract before the deadline.",
    "options": ["execute", "perform", "conduct", "operate"],
    "correctIndex": 0,
    "explanation": "契約を「締結・実行する」にはexecuteを使う。perform/conductは業務や調査に使い、operateは事業運営に使う。"
  }
]

Make it exactly ${VOCAB_COUNT} vocab and ${GRAMMAR_COUNT} grammar questions. Categories for vocab: Finance, M&A, Trading, Accounting, Economics, Management, Legal. Categories for grammar: Business Writing, Meetings, Negotiation, Reporting.`;

  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 4000,
      tools: [{ type: "web_search_20250305", name: "web_search" }],
      messages: [{ role: "user", content: prompt }]
    })
  });

  if (!res.ok) throw new Error('API error ' + res.status);
  const data = await res.json();
  const text = data.content.filter(b => b.type === "text").map(b => b.text).join("");
  const s = text.indexOf('['), e = text.lastIndexOf(']');
  if (s === -1 || e === -1) throw new Error('No JSON array found');
  return JSON.parse(text.slice(s, e+1));
}

// ---- UI Builders ----
function buildScorebar() {
  return `
    <div class="scorebar" id="scorebar">
      <div class="score-card"><div class="score-card-label">問題</div><div class="score-card-val" id="sc-q">— / ${TOTAL}</div></div>
      <div class="score-card"><div class="score-card-label">正解</div><div class="score-card-val" id="sc-c">0</div></div>
      <div class="score-card"><div class="score-card-label">正答率</div><div class="score-card-val" id="sc-r">—</div></div>
    </div>
    <div class="progress-wrap">
      <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      <div class="progress-label" id="progress-label">0 / ${TOTAL} 問完了</div>
    </div>`;
}

function updateScorebar() {
  const qEl = document.getElementById('sc-q');
  const cEl = document.getElementById('sc-c');
  const rEl = document.getElementById('sc-r');
  const pFill = document.getElementById('progress-fill');
  const pLabel = document.getElementById('progress-label');
  if (!qEl) return;
  qEl.textContent = (current + 1) + ' / ' + TOTAL;
  cEl.textContent = correctCount;
  rEl.textContent = current > 0 ? Math.round(correctCount / current * 100) + '%' : '—';
  pFill.style.width = (current / TOTAL * 100) + '%';
  pLabel.textContent = current + ' / ' + TOTAL + ' 問完了';
}

function buildDayBanner() {
  return `
    <div class="day-banner">
      <div class="day-banner-label">Today's Quiz</div>
      <div class="day-banner-title">今日のビジネス英語</div>
      <div class="day-banner-sub">単語 ${VOCAB_COUNT}問 ＋ 文法 ${GRAMMAR_COUNT}問 ・ 毎日更新</div>
    </div>`;
}

function renderQuiz() {
  const q = questions[current];
  answered = false;

  const typeTag = q.type === 'vocab'
    ? `<span class="q-type-tag tag-vocab">単語</span>`
    : `<span class="q-type-tag tag-grammar">文法</span>`;

  let questionBody = '';
  if (q.type === 'vocab') {
    questionBody = `
      <div class="q-word">${escHtml(q.word)}</div>
      <div class="q-pos">${escHtml(q.partOfSpeech)}</div>`;
  } else {
    const sentenceHtml = escHtml(q.sentence).replace('___', '<span class="blank">___</span>');
    questionBody = `<div class="q-sentence">${sentenceHtml}</div>`;
  }

  const optionsHtml = q.options.map((opt, i) => `
    <button class="opt-btn" id="opt-${i}" onclick="handleAnswer(${i})">
      <span class="opt-label">${LABELS[i]}</span>
      <span>${escHtml(opt)}</span>
    </button>`).join('');

  const card = document.getElementById('quiz-area');
  card.innerHTML = `
    <div class="quiz-card">
      <div class="q-meta">
        ${typeTag}
        <span class="q-category">${escHtml(q.category)}</span>
      </div>
      ${questionBody}
      <div class="options">${optionsHtml}</div>
      <div class="feedback-box" id="feedback"></div>
    </div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()">
      ${current + 1 >= TOTAL ? '結果を見る →' : '次の問題 →'}
    </button>`;

  updateScorebar();
}

function handleAnswer(idx) {
  if (answered) return;
  answered = true;

  const q = questions[current];
  const isCorrect = idx === q.correctIndex;

  for (let i = 0; i < q.options.length; i++) {
    const btn = document.getElementById('opt-' + i);
    btn.disabled = true;
    if (i === q.correctIndex) btn.classList.add('correct');
    else if (i === idx && !isCorrect) btn.classList.add('wrong');
  }

  if (isCorrect) {
    correctCount++;
    if (q.type === 'vocab') vocabCorrect++;
    else grammarCorrect++;
  }

  const fb = document.getElementById('feedback');
  if (isCorrect) {
    fb.className = 'feedback-box ok show';
    fb.textContent = '✓ 正解！ ' + q.explanation;
  } else {
    fb.className = 'feedback-box ng show';
    fb.textContent = '✗ 不正解。正解は「' + q.options[q.correctIndex] + '」。' + q.explanation;
  }

  document.getElementById('next-btn').style.display = 'block';
  updateScorebar();
}

function nextQuestion() {
  current++;
  if (current >= TOTAL) {
    showResult();
  } else {
    renderQuiz();
  }
}

function showResult() {
  document.getElementById('progress-fill').style.width = '100%';
  document.getElementById('progress-label').textContent = TOTAL + ' / ' + TOTAL + ' 問完了（終了）';
  document.getElementById('sc-q').textContent = TOTAL + ' / ' + TOTAL;

  const pct = Math.round(correctCount / TOTAL * 100);
  const emoji = pct >= 80 ? '🎉' : pct >= 60 ? '👍' : pct >= 40 ? '📚' : '💪';
  const label = pct >= 80 ? '素晴らしい！ビジネス英語の達人です。'
              : pct >= 60 ? 'よくできました！もう少しで完璧です。'
              : pct >= 40 ? 'まだ伸びしろあり。復習してみましょう。'
              : '基礎からしっかり復習しましょう！';

  document.getElementById('quiz-area').innerHTML = `
    <div class="result-screen">
      <div class="result-emoji">${emoji}</div>
      <div class="result-score">${correctCount} <span style="font-size:24px;color:var(--text-hint)">/ ${TOTAL}</span></div>
      <div class="result-label">${label}</div>
      <div class="result-breakdown">
        <div class="breakdown-item">
          <div class="breakdown-item-label">単語問題</div>
          <div class="breakdown-item-val blue">${vocabCorrect} / ${VOCAB_COUNT}</div>
        </div>
        <div class="breakdown-item">
          <div class="breakdown-item-label">文法問題</div>
          <div class="breakdown-item-val green">${grammarCorrect} / ${GRAMMAR_COUNT}</div>
        </div>
      </div>
      <button class="restart-btn" onclick="restartQuiz()">もう一度挑戦</button>
      <div class="share-reminder">明日も新しい問題が届きます。URLをメールで共有しましょう ↑</div>
    </div>`;
}

function restartQuiz() {
  current = 0;
  correctCount = 0;
  vocabCorrect = 0;
  grammarCorrect = 0;
  renderQuiz();
}

// ---- Copy URL ----
function copyURL() {
  const url = window.location.href;
  navigator.clipboard.writeText(url).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.classList.add('copied');
    btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> コピーしました`;
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> URLをコピー`;
    }, 2500);
  }).catch(() => {
    prompt('このURLをコピーしてください', url);
  });
}

// ---- Escape HTML ----
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ---- Init ----
async function init() {
  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="loading-screen" id="loading-view">
      <div class="spinner"></div>
      <p>今日の問題を生成中...</p>
      <small>AIがビジネス英語の問題を準備しています</small>
    </div>`;

  try {
    let qs = getCached();
    if (!qs) {
      qs = await fetchFromAPI();
      if (!Array.isArray(qs) || qs.length < TOTAL) throw new Error('Insufficient questions');
      setCache(qs.slice(0, TOTAL));
    }
    questions = qs.slice(0, TOTAL);

    main.innerHTML = buildDayBanner() + buildScorebar() + `<div id="quiz-area"></div>`;
    renderQuiz();

  } catch(e) {
    main.innerHTML = `
      <div class="error-screen">
        <p>問題の読み込みに失敗しました。<br>ネットワーク接続を確認してもう一度お試しください。</p>
        <button class="retry-btn" onclick="init()">再読み込み</button>
      </div>`;
  }
}

init();
</script>
</body>
</html>
